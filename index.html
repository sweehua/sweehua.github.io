<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>V7</title>
        <script src="https://code.jquery.com/jquery-latest.min.js"></script>
        <script>function loadBody(f) {$("#body-placeholder").load(f);}</script>
    </head>

    <body>
        <div id="top-placeholder"></div>
        <script>$(function(){$("#top-placeholder").load("template/top.html");});</script>
        <div id="body-placeholder">Hello World!</div>
        <script>
            $(document).ready(function() {
                $(".hrefBtn").click(function(e) {
                    e.preventDefault();
                    var pageTitle =  $(this).text();
                    var pageUrl = $(this).attr('href');
                    $("#body-placeholder").load(pageUrl);
                });
            });
        </script>
        <div id="bot-placeholder"></div>
        <script>$(function(){$("#bot-placeholder").load("template/bottom.html");});</script>
    </body>

</html>
