<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>V20</title>
        <link rel="stylesheet" href="css/styles.css">
        <script src="https://code.jquery.com/jquery-latest.min.js"></script>
        <script>function loadHTML(id,path) {$(id).load(path);}</script>
        <script>function loadBody(path) {loadHTML("#body-placeholder",path)}</script>
    </head>

    <body>
        <div>
            <div id="top-placeholder"></div>
            <div id="body-placeholder" style="background-color:#FFD6AA;text-align:center;color:white">Hello World!</div>
            <div id="bot-placeholder"></div>
        </div>
        
        <script>loadHTML("#top-placeholder","template/top.html")</script>
        <script>loadBody("body/main.html")</script>
        <script>loadHTML("#bot-placeholder","template/bottom.html")</script>
        
    </body>

</html>
